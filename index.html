                </div>

            <script>
              function searchSite(site) {
  const query = document.getElementById('search-input').value.trim();
  if (!query) {
    alert('検索キーワードを入力してください');
    return;
  }
  const urls = {
    mynavi: 'https://www.google.com/search?q=' + encodeURIComponent(query + ' site:job.mynavi.jp/27'),
    openwork: 'https://www.google.com/search?q=' + encodeURIComponent(query + ' site:openwork.jp')
  };
  window.open(urls[site], '_blank');
}
            </script>
